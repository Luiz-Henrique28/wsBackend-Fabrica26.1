version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: db_georank
    restart: always
    environment:
      MYSQL_DATABASE: georank_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    container_name: web_georank
    volumes:
      - ./app:/code
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=georank_db
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=3306
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
