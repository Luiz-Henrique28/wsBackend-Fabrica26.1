{% extends 'quiz/base.html' %}

{% block title %}Entrar{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px;">
    <h2 style="margin-bottom: 25px; text-align: center; color: white;">Acesse o GeoRank</h2>
    <form method="post">
        {{ csrf_input }}
        
        {% if form.errors %}
            <div class="error-msg">
                Usuário ou senha inválidos. Tente novamente.
            </div>
        {% endif %}

        <div class="form-group">
            <b>Nome de Usuário</b>
            <input type="text" name="username" placeholder="ex: luizdev" required>
        </div>
        
        <div class="form-group">
            <b>Senha Secreta</b>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; padding: 14px; font-size: 1.1rem; margin-top: 10px;">Entrar na Conta</button>
    </form>
</div>
{% endblock %}
