<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GeoRank{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ static('quiz/style.css') }}">
</head>
<body>

    <nav>
        <a href="{{ url('home') }}" class="logo">GeoRank 🌍</a>
        
        <div class="nav-links">
            {% if request.user.is_authenticated %}
                <span>Olá, {{ request.user.username }}!</span>
                <form method="post" action="{{ url('logout') }}" style="display: inline;">
                    {{ csrf_input }}
                    <button type="submit" class="btn" style="padding: 8px 20px;">Sair</button>
                </form>
            {% else %}
                <a href="{{ url('login') }}">Entrar</a>
                <a href="{{ url('register') }}" class="btn">Criar Conta</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
