<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GeoRank{% endblock %}</title>
    <!-- FontAwesome & Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ static('quiz/style.css') }}">
</head>
<body>

    <nav>
        <a href="{{ url('home') }}" class="logo"><i class="fa-solid fa-earth-americas"></i> GeoRank</a>
        
        <div class="nav-links">
            <a href="{{ url('ranking') }}"><i class="fa-solid fa-trophy"></i> Ranking</a>
            {% if request.user.is_authenticated %}
                <a href="{{ url('jogar') }}"><i class="fa-solid fa-gamepad"></i> Jogar</a>
                <a href="{{ url('perfil') }}" style="color: var(--primary);"><i class="fa-solid fa-user"></i> {{ request.user.username }}</a>
                <form method="post" action="{{ url('logout') }}" style="display: inline;">
                    {{ csrf_input }}
                    <button type="submit" class="btn" style="padding: 8px 20px; border-radius: 8px;">Sair</button>
                </form>
            {% else %}
                <a href="{{ url('login') }}">Entrar</a>
                <a href="{{ url('register') }}" class="btn">Criar Conta</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
